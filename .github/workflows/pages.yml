name: Deploy GitHub Pages

on:
  workflow_dispatch:
    inputs:
      stable_ref:
        description: "Git ref to package as the stable site"
        required: false
        type: string
      preview_ref:
        description: "Git ref to package as the preview site"
        required: false
        type: string
  push:
    branches:
      - master
    tags:
      - "v*"

permissions:
  contents: read

env:
  RESVG_VERSION: v0.47.0

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  checks:
    uses: ./.github/workflows/ci.yml

  package:
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Install resvg
        uses: ./.github/actions/install-resvg
        with:
          version: ${{ env.RESVG_VERSION }}

      - name: Install Rust target
        run: rustup target add wasm32-unknown-unknown

      - name: Fetch refs for stable and preview builds
        run: git fetch origin --force --prune "+refs/heads/*:refs/remotes/origin/*" --tags

      - name: Resolve Pages refs
        env:
          DISPATCH_STABLE_REF: ${{ github.event.inputs.stable_ref }}
          DISPATCH_PREVIEW_REF: ${{ github.event.inputs.preview_ref }}
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            if [[ -n "$DISPATCH_PREVIEW_REF" ]]; then
              echo "MAZOCARTA_PAGES_PREVIEW_REF=$DISPATCH_PREVIEW_REF" >> "$GITHUB_ENV"
            else
              echo "MAZOCARTA_PAGES_PREVIEW_REF=HEAD" >> "$GITHUB_ENV"
            fi

            if [[ -n "$DISPATCH_STABLE_REF" ]]; then
              echo "MAZOCARTA_PAGES_STABLE_REF=$DISPATCH_STABLE_REF" >> "$GITHUB_ENV"
            fi
          elif [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            echo "MAZOCARTA_PAGES_PREVIEW_REF=origin/master" >> "$GITHUB_ENV"
            echo "MAZOCARTA_PAGES_STABLE_REF=$GITHUB_REF_NAME" >> "$GITHUB_ENV"
          else
            echo "MAZOCARTA_PAGES_PREVIEW_REF=HEAD" >> "$GITHUB_ENV"
          fi

      - name: Package Pages artifact
        run: bash ./scripts/package-pages.sh _site

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: package
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
