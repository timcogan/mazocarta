name: CI

on:
  pull_request:
    branches:
      - master
  workflow_call:

permissions:
  contents: read

env:
  RESVG_VERSION: v0.47.0

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install resvg
        uses: ./.github/actions/install-resvg
        with:
          version: ${{ env.RESVG_VERSION }}

      - name: Install Rust target
        run: rustup target add wasm32-unknown-unknown

      - name: Run Gitleaks
        run: bash ./scripts/run-gitleaks.sh

      - name: Run publish checks
        run: bash ./scripts/publish-check.sh
