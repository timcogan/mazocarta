name: CI

on:
  pull_request:
    branches:
      - master
  workflow_call:

permissions:
  contents: read

env:
  RESVG_VERSION: v0.47.0

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install resvg
        run: |
          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "$tmp_dir"' EXIT
          curl -fsSL "https://github.com/linebender/resvg/releases/download/${RESVG_VERSION}/resvg-linux-x86_64.tar.gz" \
            | tar -xz -C "$tmp_dir"
          mkdir -p "$HOME/.local/bin"
          install -m 0755 "$tmp_dir/resvg" "$HOME/.local/bin/resvg"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/resvg" --version

      - name: Install Rust target
        run: rustup target add wasm32-unknown-unknown

      - name: Run Gitleaks
        run: bash ./scripts/run-gitleaks.sh

      - name: Run publish checks
        run: bash ./scripts/publish-check.sh
