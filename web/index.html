<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="mazocarta-app-channel" content="stable" />
    <meta name="mazocarta-app-title" content="Mazocarta" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Mazocarta" />
    <title>Mazocarta</title>
    <link rel="icon" type="image/svg+xml" href="./mazocarta.svg" />
    <link rel="manifest" href="./manifest.webmanifest?v=2" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png?v=2" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <canvas id="game" aria-label="Mazocarta game surface"></canvas>
    <input
      id="player-name-input"
      type="text"
      inputmode="text"
      autocomplete="off"
      autocapitalize="words"
      spellcheck="false"
      aria-label="Player name"
    />
    <div id="player-name-overlay" aria-hidden="true">
      <span id="player-name-overlay-prefix"></span>
      <span id="player-name-overlay-caret"></span>
      <span id="player-name-overlay-suffix"></span>
    </div>
    <div id="typing-pointer-overlay" aria-hidden="true"></div>
    <script type="module" src="./index.js"></script>
  </body>
</html>
